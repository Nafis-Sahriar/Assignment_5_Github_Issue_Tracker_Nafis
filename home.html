<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link rel="stylesheet" href="./Styles/styles.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Daisy UI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="shortcut icon" href="./assets/hero-leaf1.png" type="image/x-icon">

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>

</head>

<body>


    <header>
        <!-- NavBar with Search -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="w-[50px]" src="./assets/github-logo.png" alt=""> GitHub
                    Issue Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues"
                    class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn btn-primary">Search</button>
            </div>

    </header>


    <section id="toggle-btns" class="mt-20">

        <div class="w-10/12  mx-auto p-5 bg-white shadow-sm">

            <button onclick="toggle('btn-all')" id="btn-all" class="btn btn-primary">All</button>
            <button onclick="toggle('btn-open')" id="btn-open" class="btn">Open</button>
            <button onclick="toggle('btn-closed')" id="btn-closed" class="btn">Closed</button>


        </div>




    </section>


    <section id="issue-counter-nav" class="w-10/12 mx-auto mt-10">

        <div class="flex justify-between bg-white shadow-sm rounded-md p-5 ">

            <!-- Left Icon+counter -->
            <div class="flex gap-2 items-center">

                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                    <h3 class="font-bold text-2xl"><span id="issue-counter">Issues</span> <span
                            id="issue-num">Issues</span></h3>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>

            </div>


            <!-- Open Close icon in the nav bar -->
            <div class="flex items-start flex-col md:flex-row gap-5 ">

                <div class="flex gap-3 justify-center items-center">
                    <div class="border-green-500 w-5 h-5 rounded-full bg-green-600 text-green-500 text-center"></div>
                    <p>Open</p>
                </div>
                <div class="flex  gap-3 justify-center items-center">
                    <div class="border-purple-500 w-5 h-5 rounded-full bg-purple-600 text-purple-500 text-center"></div>
                    <p>Closed</p>
                </div>

            </div>




        </div>

    </section>

    <div id="loading" class="w-10/12 mx-auto text-center my-30">
        <span class="loading loading-spinner loading-xl text-green-600"></span>
    </div>


    <section id="issue-card-section" class="w-10/12 mx-auto mt-10">


        <div id="ic-container" class="w-full mx-auto grid grid-cols-1 md:grid-cols-3 gap-5 bg-white shadow-md">

            <!-- All Cards , Open and Closed, will be loaded dynamically here from api. -->
          
        </div>


    </section>



    <!-- Modal Section -->
    <section id="modal_open">

     <!-- Sob Dynmically load hobe -->
    </section>




    <!-- Extra Footer -->
    <footer class="footer sm:footer-horizontal bg-neutral text-neutral-content items-center p-4 text-center mt-20">
        <aside class="grid-flow-col items-center">
            <div class="flex items-center text-center justify-center gap-3">
                <img class="w-9 h-9 rounded-full object-cover" src="./assets/github-logo.png" alt="">
                <small>Copyright © GitHub Issue Tracker - All right reserved</small>
            </div>
           
        </aside>
        <nav class="grid-flow-col gap-4 md:place-self-center md:justify-self-end">
            <a href="https://www.facebook.com/nafis.sahriar.redwan" target="blank">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://www.linkedin.com/in/nafis-sahriar-redwan-558932329/" target="_blank">
               <i class="fa-brands fa-square-linkedin"></i>
            </a>
            <a href="">
               <i class="fa-brands fa-youtube"></i>
            </a>
        </nav>
    </footer>

    <div class="text-center bg-neutral text-white pb-10">
        <small class="font-thin">Nafis - Assignment 5 - February 2026</small>
    </div>


    <script src="./Scripts/script.js"></script>

</body>

</html>
